---
# L040: Tabs in YAML — isolated so the main playbook is not blocked by parse/syntax.
# This file intentionally contains a TAB character before "hosts".
- 	hosts: localhost
  tasks:
    - name: Task with tab-indented play
      ansible.builtin.debug:
        msg: "This playbook exists only to trigger L040 (no tabs in YAML)."

    - name: Gather info about vCenter Extensions
      community.vmware.vcenter_extension_info:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
      register: ext_info
      delegate_to: localhost
